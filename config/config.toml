[project]
name = "world-model"
seed = 1008

[data]
dataset="edbeeching/procgen"
batch_size = 32
image_size = 64
in_channels = 3
num_workers = 4


[model]
n_embd = 128
hidden_dim = 256
n_head = 4
num_layers = 4
dropout = 0.1

[training]
lr = 3e-4
max_steps = 40000
betas = [0.9, 0.99]
weight_decay = 0.01
grad_clip = 1.0
warmup_iters = 1000
eval_interval = 500
log_interval = 500
grad_accum_steps = 4
scheduler = 'cosine_with_restarts'

[diffusion]
timesteps = 1000
noise_schedule = "linear"
beta_start = 0.0001
beta_end = 0.02

